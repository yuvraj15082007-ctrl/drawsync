<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>DrawSync - Free Online Real-Time Whiteboard with Chat</title>

    <meta name="description" content="DrawSync is a free real-time online whiteboard where multiple users can draw together, create private rooms, and chat instantly. No login required. Works on mobile and desktop.">

    <meta name="keywords" content="online whiteboard, real-time drawing app, collaborative drawing, shared whiteboard, draw together online, live drawing board, whiteboard with chat">

    <meta name="author" content="Yuvraj">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Site Verification -->
    <meta name="google-site-verification" content="MCfB8pb0ei0fs4Ik2zTMLykS45k2bl_1edX7p9qDiKQ" />

    <!-- Open Graph (WhatsApp / Instagram Preview) -->
    <meta property="og:title" content="DrawSync - Free Online Whiteboard">
    <meta property="og:description" content="Draw together in real-time. Create rooms, chat and collaborate instantly.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://drawsync-vdz0.onrender.com/">

    <link rel="stylesheet" href="style.css">

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-3RPCX4Q246"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-3RPCX4Q246');
    </script>

</head>
<body>

<div class="topbar">

<input type="color" id="colorPicker">

<input type="range" id="brushSize" min="1" max="30" value="3">

<button onclick="setBrush()">Brush</button>
<button onclick="setEraser()">Eraser</button>
<button onclick="clearBoard()">Clear</button>

</div>


<div class="roomPanel">

<button onclick="createRoom()">Create</button>
<button onclick="joinRoom()">Join</button>
<button onclick="quitRoom()">Quit</button>

<div id="roomInfo">Room: public</div>
<div id="userCount">Online: 0</div>

</div>


<canvas id="canvas"></canvas>


<div class="chatBox">

<div id="messages"></div>

<div class="chatInputArea">
<input type="text" id="chatInput" placeholder="Type message...">
<button onclick="sendMessage()">Send</button>
</div>

</div>


<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
