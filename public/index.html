<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DrawSync - Free Online Real-Time Whiteboard with Chat</title>
    <meta name="description" content="DrawSync is a free real-time online whiteboard where multiple users can draw together, create private rooms, and chat instantly. No login required. Works on mobile and desktop.">
    <meta name="keywords" content="online whiteboard, real-time drawing app, collaborative drawing, shared whiteboard, draw together online, live drawing board, whiteboard with chat">
    <meta name="author" content="Yuvraj">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="MCfB8pb0ei0fs4Ik2zTMLykS45k2bl_1edX7p9qDiKQ" />
    <meta property="og:title" content="DrawSync - Free Online Whiteboard">
    <meta property="og:description" content="Draw together in real-time. Create rooms, chat and collaborate instantly.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://drawsync-vdz0.onrender.com/">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-3RPCX4Q246"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-3RPCX4Q246');
    </script>
</head>
<body>

<!-- Name Modal -->
<div id="nameModal" class="modal-overlay" style="display:flex;">
    <div class="modal-box">
        <div class="modal-logo">✏️ DrawSync</div>
        <h2>Who's drawing?</h2>
        <input type="text" id="nameInput" placeholder="Enter your name..." maxlength="20" autofocus>
        <button onclick="submitName()">Enter Canvas</button>
    </div>
</div>

<!-- Canvas -->
<canvas id="canvas"></canvas>

<!-- Floating Chat — top left (transparent) -->
<div class="chatBox" id="chatBox">
    <div class="chat-header" onclick="toggleChat()">
        <span>💬 Chat</span>
        <div class="chat-meta">
            <span id="userCount" class="online-badge">● 0</span>
            <svg id="chatChevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="13"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
    </div>
    <div id="messages"></div>
    <div class="chat-input-row">
        <input type="text" id="chatInput" placeholder="Message..." onkeydown="if(event.key==='Enter')sendMessage()">
        <button onclick="sendMessage()">→</button>
    </div>
</div>

<!-- Vertical Toolbar — right -->
<div class="toolbar" id="toolbar">

    <div class="tb-logo">DS</div>
    <div class="tb-room" id="roomInfo" title="Room">pub</div>
    <div class="tb-divider"></div>

    <!-- BRUSH GROUP -->
    <div class="tb-item" id="group-brush">
        <button class="tool-btn active" id="btn-brush-group" onclick="toggleSubmenu('brush-menu', event)" title="Brushes">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/></svg>
        </button>
        <span class="tb-label" id="label-brush-group">Pen</span>
    </div>

    <!-- Brush submenu -->
    <div class="submenu hidden" id="brush-menu">
        <button class="sub-btn active" id="btn-pen" onclick="selectBrush('pen','Pen', event)" title="Pen">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/></svg>
            <span>Pen</span>
        </button>
        <button class="sub-btn" id="btn-marker" onclick="selectBrush('marker','Marker', event)" title="Marker">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="7" height="13" rx="2"/><path d="M8.5 15v5"/><path d="M6.5 20h4"/></svg>
            <span>Marker</span>
        </button>
        <button class="sub-btn" id="btn-highlighter" onclick="selectBrush('highlighter','Hi-lite', event)" title="Highlighter">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l-6 6v3h3l6-6"/><path d="M22 4l-3-3-9.5 9.5 3 3L22 4z"/></svg>
            <span>Hilite</span>
        </button>
        <button class="sub-btn" id="btn-calligraphy" onclick="selectBrush('calligraphy','Calli', event)" title="Calligraphy">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21c3-3 4-8 3-12 2 1 5 1 7-1s2-5 1-7c4 4 4 10 0 14"/></svg>
            <span>Calli</span>
        </button>
    </div>

    <!-- ERASER -->
    <div class="tb-item">
        <button class="tool-btn" id="btn-eraser" onclick="setTool('eraser')" title="Eraser">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 20H7L3 16l10-10 7 7-2.5 2.5"/><path d="M6 11L13 18"/></svg>
        </button>
        <span class="tb-label">Eraser</span>
    </div>

    <div class="tb-divider"></div>

    <!-- SHAPES GROUP -->
    <div class="tb-item">
        <button class="tool-btn" id="btn-shapes-group" onclick="toggleSubmenu('shapes-menu', event)" title="Shapes">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><circle cx="17.5" cy="6.5" r="3.5"/><path d="M12 21l4-7H8l4 7z"/></svg>
        </button>
        <span class="tb-label" id="label-shapes-group">Shapes</span>
    </div>

    <!-- Shapes submenu -->
    <div class="submenu hidden" id="shapes-menu">
        <button class="sub-btn" id="btn-rect" onclick="selectShape('rect','Rect', event)" title="Rectangle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/></svg>
            <span>Rect</span>
        </button>
        <button class="sub-btn" id="btn-circle" onclick="selectShape('circle','Circle', event)" title="Circle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>
            <span>Circle</span>
        </button>
        <button class="sub-btn" id="btn-line" onclick="selectShape('line','Line', event)" title="Line">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="19" x2="19" y2="5"/></svg>
            <span>Line</span>
        </button>
        <button class="sub-btn" id="btn-triangle" onclick="selectShape('triangle','Tri', event)" title="Triangle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3L22 21H2L12 3z"/></svg>
            <span>Triangle</span>
        </button>
        <button class="sub-btn" id="btn-arrow" onclick="selectShape('arrow','Arrow', event)" title="Arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="13 6 19 12 13 18"/></svg>
            <span>Arrow</span>
        </button>
        <button class="sub-btn" id="btn-star" onclick="selectShape('star','Star', event)" title="Star">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            <span>Star</span>
        </button>
    </div>

    <div class="tb-divider"></div>

    <!-- Color + Size -->
    <div class="tb-item">
        <div class="color-wrap"><input type="color" id="colorPicker" value="#000000" title="Color"></div>
        <span class="tb-label">Color</span>
    </div>

    <div class="tb-item">
        <div class="size-btn" onclick="openSizePopup()" title="Size">
            <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="5"/></svg>
            <span id="sizeLabel">3</span>
        </div>
        <span class="tb-label">Size</span>
    </div>

    <div class="tb-divider"></div>

    <!-- Undo / Redo -->
    <div class="tb-item">
        <button class="tool-btn" onclick="undoAction()" title="Undo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 14L4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 0 11H11"/></svg>
        </button>
        <span class="tb-label">Undo</span>
    </div>

    <div class="tb-item">
        <button class="tool-btn" onclick="redoAction()" title="Redo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 14l5-5-5-5"/><path d="M20 9H9.5a5.5 5.5 0 0 0 0 11H13"/></svg>
        </button>
        <span class="tb-label">Redo</span>
    </div>

    <div class="tb-divider"></div>

    <!-- Download -->
    <div class="tb-item">
        <button class="tool-btn" onclick="downloadImage()" title="Download">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
        <span class="tb-label">Save</span>
    </div>

    <div class="tb-divider"></div>

    <!-- Rooms -->
    <div class="tb-item">
        <button class="tool-btn" onclick="createRoom()" title="New Room">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        </button>
        <span class="tb-label">New</span>
    </div>

    <div class="tb-item">
        <button class="tool-btn" onclick="joinRoom()" title="Join Room">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        </button>
        <span class="tb-label">Join</span>
    </div>

    <div class="tb-item">
        <button class="tool-btn" onclick="quitRoom()" title="Quit Room">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
        <span class="tb-label">Quit</span>
    </div>

    <div class="tb-divider"></div>

    <div class="tb-item">
        <button class="tool-btn danger" onclick="clearBoard()" title="Clear">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
        <span class="tb-label">Clear</span>
    </div>

</div>

<!-- Size popup -->
<div class="size-popup hidden" id="sizePopup">
    <div class="size-popup-label">Size: <span id="sizePopupVal">3</span>px</div>
    <input type="range" id="brushSize" min="1" max="50" value="3">
    <button onclick="closeSizePopup()">Done</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>

<!-- PATCH: Fix name modal hide bug -->
<script>
// Override submitName to directly hide modal via style
function submitName() {
    var nameVal = document.getElementById("nameInput").value.trim() || "Guest";
    window.userName = nameVal;
    var modal = document.getElementById("nameModal");
    modal.style.display = "none";
    joinRoomSocket("public");
}
document.addEventListener("DOMContentLoaded", function() {
    document.getElementById("nameInput").addEventListener("keydown", function(e) {
        if (e.key === "Enter") submitName();
    });
});
</script>
