<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DrawSync - Free Online Real-Time Whiteboard with Chat</title>
    <meta name="description" content="DrawSync is a free real-time online whiteboard where multiple users can draw together, create private rooms, and chat instantly. No login required. Works on mobile and desktop.">
    <meta name="keywords" content="online whiteboard, real-time drawing app, collaborative drawing, shared whiteboard, draw together online, live drawing board, whiteboard with chat">
    <meta name="author" content="Yuvraj">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="MCfB8pb0ei0fs4Ik2zTMLykS45k2bl_1edX7p9qDiKQ" />
    <meta property="og:title" content="DrawSync - Free Online Whiteboard">
    <meta property="og:description" content="Draw together in real-time. Create rooms, chat and collaborate instantly.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://drawsync-vdz0.onrender.com/">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-3RPCX4Q246"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-3RPCX4Q246');
    </script>
</head>
<body>

<!-- Name Modal -->
<div id="nameModal" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-logo">✏️ DrawSync</div>
        <h2>Who's drawing?</h2>
        <input type="text" id="nameInput" placeholder="Enter your name..." maxlength="20" autofocus>
        <button onclick="submitName()">Enter Canvas</button>
    </div>
</div>

<!-- Room Modal (reused dynamically) -->

<!-- Canvas — full screen -->
<canvas id="canvas"></canvas>

<!-- Floating Chat — top left -->
<div class="chatBox" id="chatBox">
    <div class="chat-header" onclick="toggleChat()">
        <span>💬 Chat</span>
        <div class="chat-meta">
            <span id="userCount" class="online-badge">● 0</span>
            <svg id="chatChevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
    </div>
    <div id="messages"></div>
    <div class="chat-input-row">
        <input type="text" id="chatInput" placeholder="Message..." onkeydown="if(event.key==='Enter')sendMessage()">
        <button onclick="sendMessage()">→</button>
    </div>
</div>

<!-- Vertical Toolbar — right side -->
<div class="toolbar" id="toolbar">

    <!-- Logo / room info at top -->
    <div class="tb-logo">DS</div>
    <div class="tb-room" id="roomInfo" title="Room">pub</div>

    <div class="tb-divider"></div>

    <!-- Draw tools -->
    <button class="tool-btn active" id="btn-brush" onclick="setTool('brush')" title="Brush">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>
    </button>
    <button class="tool-btn" id="btn-eraser" onclick="setTool('eraser')" title="Eraser">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 20H7L3 16l10-10 7 7-2.5 2.5"/><path d="M6 11L13 18"/></svg>
    </button>
    <button class="tool-btn" id="btn-rect" onclick="setTool('rect')" title="Rectangle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
    </button>
    <button class="tool-btn" id="btn-circle" onclick="setTool('circle')" title="Circle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>
    </button>
    <button class="tool-btn" id="btn-line" onclick="setTool('line')" title="Line">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="19" x2="19" y2="5"/></svg>
    </button>

    <div class="tb-divider"></div>

    <!-- Color picker -->
    <div class="color-wrap" title="Color">
        <input type="color" id="colorPicker" value="#000000">
    </div>

    <!-- Brush size -->
    <div class="size-btn" onclick="openSizePopup()" title="Brush Size">
        <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="5"/></svg>
        <span id="sizeLabel">3</span>
    </div>

    <div class="tb-divider"></div>

    <!-- Undo / Redo -->
    <button class="tool-btn" onclick="undoAction()" title="Undo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 14L4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 0 11H11"/></svg>
    </button>
    <button class="tool-btn" onclick="redoAction()" title="Redo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 14l5-5-5-5"/><path d="M20 9H9.5a5.5 5.5 0 0 0 0 11H13"/></svg>
    </button>

    <div class="tb-divider"></div>

    <!-- Room -->
    <button class="tool-btn" onclick="createRoom()" title="Create Room">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
    </button>
    <button class="tool-btn" onclick="joinRoom()" title="Join Room">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
    </button>
    <button class="tool-btn" onclick="quitRoom()" title="Quit Room">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>

    <div class="tb-divider"></div>

    <!-- Clear -->
    <button class="tool-btn danger" onclick="clearBoard()" title="Clear Board">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
    </button>
</div>

<!-- Brush size popup -->
<div class="size-popup hidden" id="sizePopup">
    <div class="size-popup-label">Brush Size: <span id="sizePopupVal">3</span>px</div>
    <input type="range" id="brushSize" min="1" max="30" value="3">
    <button onclick="closeSizePopup()">Done</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
